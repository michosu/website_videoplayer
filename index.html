<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; }

  #player-wrap {
    width: 100%;
    background: #000;
  }

  #video-container {
    position: relative;
    aspect-ratio: 16 / 9;
  }

  #yt-iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  #thumbnail {
    position: absolute;
    inset: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #thumb-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
  }

  #play-btn-overlay {
    position: relative;
    z-index: 1;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(255, 0, 0, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #play-btn-overlay svg {
    fill: white;
    width: 28px;
    height: 28px;
    margin-left: 4px;
  }

  #controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #111;
  }

  #toggle-btn {
    background: none;
    border: 1px solid #fff;
    color: #fff;
    padding: 6px 12px;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }

  #seek {
    flex: 1;
    cursor: pointer;
    accent-color: #f00;
  }

  #vol {
    width: 80px;
    cursor: pointer;
    accent-color: #fff;
  }

  #time-display {
    color: #fff;
    font-size: 12px;
    min-width: 80px;
    text-align: right;
    flex-shrink: 0;
    font-family: sans-serif;
  }
</style>
</head>
<body>

<div id="player-wrap">
  <div id="video-container">
    <iframe id="yt-iframe"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>

    <div id="thumbnail">
      <img id="thumb-img" />
      <div id="play-btn-overlay">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
    </div>
  </div>

  <div id="controls">
    <button id="toggle-btn">▶</button>
    <input id="seek" type="range" min="0" max="1000" value="0" />
    <input id="vol"  type="range" min="0" max="100"  value="80" />
    <span  id="time-display">0:00 / 0:00</span>
  </div>
</div>

<script>
  const youtubeId = new URLSearchParams(location.search).get('v') || '';

  const iframe      = document.getElementById('yt-iframe');
  const thumbnail   = document.getElementById('thumbnail');
  const thumbImg    = document.getElementById('thumb-img');
  const toggleBtn   = document.getElementById('toggle-btn');
  const seekInput   = document.getElementById('seek');
  const volInput    = document.getElementById('vol');
  const timeDisplay = document.getElementById('time-display');

  let player   = null;
  let ready    = false;
  let playing  = false;
  let seeking  = false;
  let duration = 0;

  // Set thumbnail
  if (youtubeId) {
    thumbImg.src = `https://img.youtube.com/vi/${youtubeId}/maxresdefault.jpg`;
  }

  // Load YouTube IFrame API
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  function startPlayer() {
    const origin = (location.origin && location.origin !== 'null')
      ? '&origin=' + encodeURIComponent(location.origin)
      : '';

    iframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&controls=0&enablejsapi=1&rel=0&modestbranding=1${origin}`;

    player = new YT.Player(iframe, {
      events: {
        onReady: () => {
          ready = true;
          player.setVolume(parseInt(volInput.value));

          setInterval(() => {
            if (!player || seeking) return;
            const cur = player.getCurrentTime() || 0;
            duration  = player.getDuration()    || 0;
            seekInput.value = duration ? (cur / duration) * 1000 : 0;
            timeDisplay.textContent = fmt(cur) + ' / ' + fmt(duration);
          }, 250);
        },
        onStateChange: (e) => {
          playing = e.data === YT.PlayerState.PLAYING;
          toggleBtn.textContent = playing ? '⏸' : '▶';

          if (e.data === YT.PlayerState.ENDED) {
            player.seekTo(0);
            player.pauseVideo();
          }
        }
      }
    });

    thumbnail.style.display = 'none';
  }

  thumbnail.addEventListener('click', () => {
    if (window.YT?.Player) startPlayer();
    else window.onYouTubeIframeAPIReady = startPlayer;
  });

  toggleBtn.addEventListener('click', () => {
    if (!player) {
      if (window.YT?.Player) startPlayer();
      else window.onYouTubeIframeAPIReady = startPlayer;
      return;
    }
    if (!ready) return;
    playing ? player.pauseVideo() : player.playVideo();
  });

  seekInput.addEventListener('mousedown', () => { seeking = true; });
  seekInput.addEventListener('mouseup',   () => { seeking = false; });
  seekInput.addEventListener('input', () => {
    if (!ready || !player) return;
    player.seekTo((seekInput.value / 1000) * duration, true);
  });

  volInput.addEventListener('input', () => {
    if (ready && player) player.setVolume(parseInt(volInput.value));
  });

  function fmt(s) {
    return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
  }
</script>

</body>
</html>
